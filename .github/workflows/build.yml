name: Build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (ZIP archive)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Both apps import @dash/shared through its built dist/, so it must
      # be built before anything that depends on it compiles.
      - name: Build shared package
        run: pnpm --filter @dash/shared build

      - name: Typecheck
        run: pnpm typecheck

      - name: Build web app
        run: pnpm --filter @dash/web build

      - name: Create ZIP archive
        run: |
          cd apps/web/dist
          zip -r "${GITHUB_WORKSPACE}/dash-web-${GITHUB_SHA::7}.zip" .

      - uses: actions/upload-artifact@v4
        with:
          name: dash-web
          path: dash-web-*.zip
          if-no-files-found: error

  backend:
    name: Backend (Docker image)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-api
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha

      # The API image is built from the repo root so the pnpm workspace
      # and @dash/shared are in build context (see apps/api/Dockerfile).
      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
