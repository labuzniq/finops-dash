services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dash}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dash}
      POSTGRES_DB: ${POSTGRES_DB:-dash}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-dash} -d ${POSTGRES_DB:-dash}']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    # Opt-in: `docker compose up` starts Postgres only, because the default dev
    # loop runs the API locally with watch (`pnpm dev`) and the two would fight
    # over port 4000. Start the container stack with `pnpm up` instead.
    profiles: ['full']
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_PORT: 4000
      # Inside the compose network the host is the service name, not localhost.
      DATABASE_URL: postgres://${POSTGRES_USER:-dash}:${POSTGRES_PASSWORD:-dash}@postgres:5432/${POSTGRES_DB:-dash}
      DB_SCHEMA: ${DB_SCHEMA:-public}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      COPILOT_SOURCE: ${COPILOT_SOURCE:-mock}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_ORG: ${GITHUB_ORG:-}
    ports:
      - '${API_PORT:-4000}:4000'
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
